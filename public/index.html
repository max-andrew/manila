<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manila — the pay envelope, rebuilt onchain</title>
<style>
  :root {
    --manila: #E0BE7E;   /* kraft — sealed badges + approval banner only */
    --ink:    #1F2430;   /* structural text and borders */
    --stamp:  #C0392B;   /* reserved for blocked / pending / over-policy */
    --paper:  #FAF6EE;   /* page background */
    --khaki:  #6B6253;   /* secondary text */
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); padding: 2rem; }
  header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 0.4rem; }
  h1 { font-size: 1.5rem; letter-spacing: 0.02em; }
  .tagline { color: var(--khaki); font-size: 0.9rem; }
  .gh { margin-left: auto; align-self: center; color: var(--ink); line-height: 0; }
  .gh svg { width: 22px; height: 22px; fill: currentColor; display: block; }
  .gh:hover { color: var(--khaki); }
  main { display: grid; grid-template-columns: 1fr 1.3fr 1.3fr; gap: 1rem; margin-top: 1.5rem; }
  section { border: 1.5px solid var(--ink); background: #fff; padding: 1rem; min-height: 18rem; }
  section h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.12em;
               border-bottom: 1.5px solid var(--ink); padding-bottom: 0.5rem; margin-bottom: 0.75rem; }
  .num, .mono, table, #chat-log { font-family: var(--mono); }
  .muted { color: var(--khaki); }
  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  th, td { text-align: left; padding: 0.35rem 0.5rem; border-bottom: 1px solid #e5dfd2; }
  th { color: var(--khaki); font-weight: 500; }
  .badge { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.14em; padding: 0.15rem 0.45rem; }
  .badge.sealed { background: var(--manila); color: var(--khaki); transform: rotate(-1.5deg); display: inline-block; }
  .badge.pending { color: var(--stamp); border: 1.5px solid var(--stamp); }
  .badge.released { color: #fff; background: var(--ink); }
  #treasury-balance { font-size: 1.8rem; margin: 0.5rem 0; }
  footer { margin-top: 1.5rem; color: var(--khaki); font-size: 0.75rem; }
  #chat-log { margin-bottom: 0.75rem; max-height: 11rem; overflow-y: auto; }
  .msg { font-size: 0.8rem; margin: 0.3rem 0; line-height: 1.4; }
  .msg.you { color: var(--khaki); }
  .msg.agent { color: var(--ink); }
  .msg .who { font-family: var(--sans); text-transform: uppercase; letter-spacing: 0.1em;
              font-size: 0.6rem; color: var(--khaki); margin-right: 0.4rem; }
  #chat-form { display: flex; gap: 0.5rem; }
  #chat-input { flex: 1; font-family: var(--mono); font-size: 0.8rem; padding: 0.4rem 0.5rem;
                border: 1.5px solid var(--ink); background: #fff; color: var(--ink); }
  button { font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.06em; cursor: pointer;
           padding: 0.4rem 0.8rem; border: 1.5px solid var(--ink); background: var(--ink); color: #fff; }
  button:disabled { opacity: 0.5; cursor: default; }
  #approval-banner { background: var(--manila); border: 1.5px solid var(--ink); padding: 0.6rem 0.75rem;
                     margin-bottom: 0.75rem; font-size: 0.8rem; }
  #approval-banner .badge { margin-bottom: 0.4rem; display: inline-block; }
  #approval-banner button { background: var(--paper); color: var(--ink); margin-top: 0.4rem; }
  #csv-link { font-family: var(--mono); font-size: 0.72rem; color: var(--ink); display: inline-block;
              margin-top: 0.75rem; }
  .seal a { font-family: var(--mono); font-size: 0.72rem; color: var(--khaki); text-decoration: none; }
  .seal a:hover { color: var(--ink); }
</style>
</head>
<body>
<header>
  <h1>Manila</h1>
  <span class="tagline">The pay envelope, rebuilt onchain.</span>
  <a class="gh" href="https://github.com/max-andrew/manila" target="_blank" rel="noopener"
     aria-label="View source on GitHub" title="View source on GitHub">
    <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
  </a>
</header>

<main>
  <section id="treasury">
    <h2>Treasury</h2>
    <div id="treasury-balance" class="num muted">—</div>
    <div id="treasury-sub" class="muted" style="font-size:0.8rem">USDC on Arc testnet</div>
    <table id="employees" style="margin-top:1rem">
      <thead><tr><th>Employee</th><th>Salary</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section id="agent">
    <h2>Agent</h2>
    <div id="approval-banner" hidden></div>
    <div id="chat-log"><div class="muted" style="font-size:0.8rem">Awaiting instructions.</div></div>
    <form id="chat-form" autocomplete="off">
      <input id="chat-input" type="text" placeholder="Run June payroll"
             value="Run June payroll with a 25% bonus" />
      <button type="submit" id="chat-send">Send</button>
    </form>
  </section>

  <section id="audit">
    <h2>Audit</h2>
    <table id="audit-table">
      <thead><tr><th>When</th><th>Actor</th><th>Action</th><th>Result</th><th>Seal</th></tr></thead>
      <tbody></tbody>
    </table>
    <a id="csv-link" href="/api/audit.csv">Open the envelope (CSV)</a>
  </section>
</main>

<footer class="mono" id="status">connecting…</footer>

<script>
const usd = (micro) => '$' + (Number(micro) / 1e6).toLocaleString('en-US', { minimumFractionDigits: 2 });
const esc = (s) => String(s ?? '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
const el = (id) => document.getElementById(id);
const EXPLORER = 'https://testnet.arcscan.app/tx/';

// A sealed disbursement's tx_refs hold the on-chain hash; link it (amounts
// stay hidden on the explorer — that's the point).
function sealCell(refsJson) {
  let refs = [];
  try { refs = JSON.parse(refsJson || '[]'); } catch {}
  const hash = (refs.find(r => /^0x[0-9a-f]{64}$/i.test(r)) || '');
  return hash ? `<a href="${EXPLORER}${hash}" target="_blank" rel="noopener" title="${hash}">sealed&nbsp;↗</a>` : '';
}

async function load() {
  try {
    const [health, employees, audit, treasury] = await Promise.all([
      fetch('/api/health').then(r => r.json()),
      fetch('/api/employees').then(r => r.json()),
      fetch('/api/audit').then(r => r.json()),
      fetch('/api/treasury').then(r => r.json()).catch(() => null),
    ]);
    el('status').textContent = health.ok ? 'manila · connected' : 'service degraded';

    if (treasury?.sealed?.available) {
      el('treasury-balance').textContent = '$' + treasury.sealed.formatted;
      el('treasury-balance').classList.remove('muted');
      el('treasury-sub').textContent =
        `sealed USDC · ${treasury.fees?.available ? '$' + treasury.fees.formatted + ' fee balance' : 'Arc testnet'}`;
    }

    document.querySelector('#employees tbody').innerHTML = employees
      .map(e => `<tr><td>${esc(e.name)}</td><td class="num">${usd(e.salary_micro)}</td></tr>`)
      .join('');

    document.querySelector('#audit-table tbody').innerHTML = audit.length
      ? audit.map(a => `<tr><td>${esc(a.created_at)}</td><td>${esc(a.actor)}</td><td>${esc(a.action)}</td>
          <td>${esc(a.policy_result ?? '')}</td><td class="seal">${sealCell(a.tx_refs)}</td></tr>`).join('')
      : '<tr><td colspan="5" class="muted">No entries yet.</td></tr>';

    await refreshApproval();
  } catch (err) {
    el('status').textContent = 'error: ' + err.message;
  }
}

function addMsg(who, text) {
  const log = el('chat-log');
  if (log.querySelector('.muted')) log.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'msg ' + (who === 'You' ? 'you' : 'agent');
  div.innerHTML = `<span class="who">${who}</span>${esc(text)}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function refreshApproval() {
  // Surface the most recent run that is waiting for a second signature.
  const audit = await fetch('/api/audit').then(r => r.json()).catch(() => []);
  const pending = audit.find(a => a.action === 'approval_requested');
  const released = audit.find(a => a.action === 'approved' || a.action === 'run_sealed' || a.action === 'run_failed');
  const banner = el('approval-banner');
  if (pending && (!released || released.id < pending.id)) {
    let reason = '';
    try { reason = JSON.parse(pending.detail).reason || ''; } catch {}
    banner.innerHTML = `<span class="badge pending">PENDING APPROVAL</span>
      <div>Run ${pending.run_id} needs a second signature. ${esc(reason)}</div>
      <button data-run="${pending.run_id}">Add second signature</button>`;
    banner.hidden = false;
    banner.querySelector('button').onclick = approve;
  } else {
    banner.hidden = true;
  }
}

async function approve(e) {
  const btn = e.target;
  btn.disabled = true;
  btn.textContent = 'Releasing…';
  try {
    const res = await fetch('/api/approve/' + btn.dataset.run, { method: 'POST' });
    const data = await res.json();
    const sealed = (data.payments || []).filter(p => p.status === 'sealed').length;
    addMsg('Agent', res.ok && sealed
      ? `Released. ${sealed} payments sealed.`
      : `Approved. ${data.message || (data.payments ? 'settlement pending — see audit log.' : data.error || '')}`);
  } catch (err) {
    addMsg('Agent', 'Approval error: ' + err.message);
  }
  await load();
}

el('chat-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = el('chat-input');
  const message = input.value.trim();
  if (!message) return;
  addMsg('You', message);
  input.value = '';
  const send = el('chat-send');
  send.disabled = true; send.textContent = '…';
  try {
    const res = await fetch('/api/agent', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ message }),
    });
    const data = await res.json();
    addMsg('Agent', data.reply || data.error || 'No response.');
  } catch (err) {
    addMsg('Agent', 'Error: ' + err.message);
  }
  send.disabled = false; send.textContent = 'Send';
  await load();
});

load();
</script>
</body>
</html>
